name: Publish

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    defaults:
      run:
        shell: bash
    env:
      GH_TOKEN: ${{ github.token }}
      ARCH_REPO_GPG_PRIVATE_KEY: ${{ secrets.ARCH_REPO_GPG_PRIVATE_KEY }}
      ARCH_REPO_GPG_PASSPHRASE: ${{ secrets.ARCH_REPO_GPG_PASSPHRASE }}
      ARCH_REPO_GPG_KEY_ID: ${{ secrets.ARCH_REPO_GPG_KEY_ID }}
      GITHUB_RELEASE_MAX_FILE_SIZE_BYTES: "2000000000"
      PACMAN_RELEASE_TAG: repo-x86_64
      GNUPGHOME: ${{ github.workspace }}/.artifacts/gnupg
    steps:
      - name: Install checkout prerequisites
        run: |
          pacman -Sy --noconfirm archlinux-keyring
          pacman -S --noconfirm --needed git

      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git safe directory
        run: git config --system --add safe.directory "$GITHUB_WORKSPACE"

      - name: Verify Git checkout
        run: git -C "$GITHUB_WORKSPACE" rev-parse --is-inside-work-tree

      - name: Install build dependencies
        run: |
          pacman -Sy --noconfirm archlinux-keyring
          pacman -S --noconfirm --needed base-devel github-cli gnupg nodejs pacman-contrib pnpm rsync sudo

      - name: Prepare builder user
        run: |
          useradd -m builder
          install -d -m 0750 /etc/sudoers.d
          printf 'builder ALL=(ALL) NOPASSWD: ALL\n' > /etc/sudoers.d/builder
          chmod 0440 /etc/sudoers.d/builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Install site dependencies
        run: su - builder -c "cd '$GITHUB_WORKSPACE/site' && pnpm install --frozen-lockfile"

      - name: Build static site
        run: su - builder -c "cd '$GITHUB_WORKSPACE/site' && pnpm run build:pages"

      - name: Build changed packages
        run: |
          base_ref="${{ github.event.before }}"
          head_ref="${{ github.sha }}"

          su - builder -c "cd '$GITHUB_WORKSPACE' && ./repo/scripts/build_changed.sh \
            --base '$base_ref' \
            --head '$head_ref' \
            --include-dependents \
            --verify-srcinfo \
            --output-dir '$GITHUB_WORKSPACE/.artifacts/packages'"

      - name: Detect publishable artifacts
        id: artifacts
        run: |
          mapfile -t pkgfiles < <(find "$GITHUB_WORKSPACE/.artifacts/packages" -maxdepth 1 -type f -name '*.pkg.tar.*' ! -name '*.sig' | sort)
          if (( ${#pkgfiles[@]} > 0 )); then
            echo "has_packages=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_packages=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve signing mode
        id: signing
        if: steps.artifacts.outputs.has_packages == 'true'
        run: |
          if [[ -n "${ARCH_REPO_GPG_PRIVATE_KEY}" && -n "${ARCH_REPO_GPG_KEY_ID}" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Using signed package-repo publish."
          elif [[ -z "${ARCH_REPO_GPG_PRIVATE_KEY}" && -z "${ARCH_REPO_GPG_PASSPHRASE}" && -z "${ARCH_REPO_GPG_KEY_ID}" ]]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::warning::Publishing an unsigned pacman repo because no signing secrets are configured."
          else
            echo "::error::Signing secrets are partially configured. Set ARCH_REPO_GPG_PRIVATE_KEY and ARCH_REPO_GPG_KEY_ID together, or remove all signing secrets to publish unsigned."
            exit 1
          fi

      - name: Import signing key
        if: steps.artifacts.outputs.has_packages == 'true' && steps.signing.outputs.enabled == 'true'
        run: ./repo/scripts/import_gpg_key.sh --export "$GITHUB_WORKSPACE/.artifacts/repo-signing-key.asc"

      - name: Prepare gh-pages worktree
        run: |
          if git -C "$GITHUB_WORKSPACE" ls-remote --exit-code origin gh-pages >/dev/null 2>&1; then
            git -C "$GITHUB_WORKSPACE" fetch origin gh-pages
            git -C "$GITHUB_WORKSPACE" worktree add -B gh-pages "$GITHUB_WORKSPACE/.pages" origin/gh-pages
          else
            git -C "$GITHUB_WORKSPACE" worktree add --detach "$GITHUB_WORKSPACE/.pages" HEAD
            git -C "$GITHUB_WORKSPACE/.pages" checkout --orphan gh-pages
            git -C "$GITHUB_WORKSPACE/.pages" rm -rf . >/dev/null 2>&1 || true
            git -C "$GITHUB_WORKSPACE/.pages" clean -fdx
          fi

          git config --global --add safe.directory "$GITHUB_WORKSPACE/.pages"
          git -C "$GITHUB_WORKSPACE/.pages" config user.name "github-actions[bot]"
          git -C "$GITHUB_WORKSPACE/.pages" config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Publish static site
        run: |
          ./repo/scripts/publish_site.sh \
            --site-dir "$GITHUB_WORKSPACE/site/build" \
            --pages-dir "$GITHUB_WORKSPACE/.pages"

      - name: Push gh-pages updates
        run: |
          status_output="$(git -C "$GITHUB_WORKSPACE/.pages" status --short)"
          if [[ -n "$status_output" ]]; then
            git -C "$GITHUB_WORKSPACE/.pages" add .
            git -C "$GITHUB_WORKSPACE/.pages" commit -m "Publish site for ${GITHUB_SHA}"
            git -C "$GITHUB_WORKSPACE/.pages" push origin gh-pages
          else
            echo "No gh-pages changes to publish."
          fi

      - name: Sync pacman release assets
        if: steps.artifacts.outputs.has_packages == 'true'
        run: |
          ./repo/scripts/sync_release_repo.sh \
            --repo "$GITHUB_REPOSITORY" \
            --tag "$PACMAN_RELEASE_TAG" \
            --repo-dir "$GITHUB_WORKSPACE/.release-repo"

      - name: Build pacman release payload
        if: steps.artifacts.outputs.has_packages == 'true'
        run: |
          ./repo/scripts/publish_repo.sh \
            --artifacts-dir "$GITHUB_WORKSPACE/.artifacts/packages" \
            --repo-dir "$GITHUB_WORKSPACE/.release-repo" \
            --repo-name k3apps

      - name: Publish pacman release
        if: steps.artifacts.outputs.has_packages == 'true'
        run: |
          release_notes="$(mktemp)"
          cat > "$release_notes" <<EOF
          Automated pacman repository assets for x86_64.

          Pacman server base URL:
          https://github.com/${GITHUB_REPOSITORY}/releases/download/${PACMAN_RELEASE_TAG}
          EOF

          ./repo/scripts/publish_release_assets.sh \
            --repo "$GITHUB_REPOSITORY" \
            --tag "$PACMAN_RELEASE_TAG" \
            --asset-dir "$GITHUB_WORKSPACE/.release-repo" \
            --title "k3apps pacman repo (x86_64)" \
            --notes "$(cat "$release_notes")" \
            --target "${GITHUB_SHA}"

      - name: Skip pacman release publish
        if: steps.artifacts.outputs.has_packages != 'true'
        run: echo "No package artifacts were built; skipping release publish."
